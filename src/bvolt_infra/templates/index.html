<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bvolt-infra Dashboard</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>bvolt-infra</h1>
        <p>Read-only dashboard backed by bvolt-core API.</p>
        <p><strong>Source:</strong> {{ core_source_label }}</p>
        <p><strong>Refresh:</strong> {{ refresh_seconds }}s</p>
      </section>
      <section id="status" class="status">Loading...</section>
      <section id="cards" class="grid"></section>
    </main>
    <script>
      window.BVOLT_INFRA = {
        refreshSeconds: {{ refresh_seconds }},
      };
    </script>
    <script src="/static/app.js"></script>
  </body>
  </html>
