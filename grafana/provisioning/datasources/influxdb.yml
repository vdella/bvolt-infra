apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    orgId: 1
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: bvolt
      defaultBucket: bvolt_dev
    secureJsonData:
      token: ${INFLUX_GRAFANA_TOKEN}
    isDefault: true

services:
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    networks:
      - monitoring
    depends_on:
      - influxdb

networks:
  monitoring:
